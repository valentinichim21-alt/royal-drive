<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        #box { font-size: 1.5em; padding: 15px; border-radius: 10px; font-weight: bold; }
        .verde { background: #28a745; }
        .rosu { background: #ff4d4d; }
    </style>
</head>
<body>
    <div id="box">CALCULEZ...</div>
    <script>
        const params = new URLSearchParams(window.location.search);
        let pRaw = params.get('p');

        if (pRaw) {
            // Curățăm tot ce nu e cifră sau punct/virgulă
            let pretCurat = pRaw.replace(/[^\d,.]/g, '').replace(',', '.');
            let pret = parseFloat(pretCurat);

            if (!isNaN(pret)) {
                let kmTotali = 7; // Punem o medie de 7km (2.8 distanță + 4.2 cursă din poza ta)
                let profit = (pret * 0.75) - (kmTotali * 0.8);
                let rata = (profit / (kmTotali * 1.5)) * 60;

                let display = document.getElementById('box');
                if (rata > 35) {
                    display.className = "verde";
                    display.innerHTML = "ACCEPTĂ ✅<br>" + rata.toFixed(2) + " RON/h";
                } else {
                    display.className = "rosu";
                    display.innerHTML = "REFUZĂ ❌<br>" + rata.toFixed(2) + " RON/h";
                }
            } else {
                document.getElementById('box').innerHTML = "EROARE DATE";
            }
        }
    </script>
</body>
</html>
