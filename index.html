<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: rgba(0,0,0,0.9); color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        #rezultat { font-size: 1.4em; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        .verde { background: #28a745; } .rosu { background: #ff4d4d; }
    </style>
</head>
<body>
    <div id="rezultat">Aștept Uber...</div>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.has('p')) {
            let p = parseFloat(params.get('p').replace(',', '.')); // Preț de la MacroDroid
            let d = 5; // KM estimați (sau poți pune alt parametru)
            let profit = (p * 0.75) - (d * 0.80);
            let rata = (profit / (d * 1.5)) * 60;
            let div = document.getElementById('rezultat');
            if (rata > 40) { div.className = 'verde'; div.innerHTML = "ACCEPTĂ ✅<br>" + rata.toFixed(2) + " RON/h"; }
            else { div.className = 'rosu'; div.innerHTML = "REFUZĂ ❌<br>" + rata.toFixed(2) + " RON/h"; }
        }
    </script>
</body>
</html>
