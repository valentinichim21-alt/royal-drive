<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ică App Store</title>
    <style>
        body { 
            background: transparent !important; 
            margin: 0; padding: 0; 
            overflow: hidden; 
            font-family: sans-serif;
        }
        /* Ascundem restul interfeței să rămână doar bara */
        #consola, .header, .btn-scan, .scanner-container { display: none !important; }

        .verdict { 
    position: fixed; 
    top: 10px; /* Acum e sus de tot, sub oglindă */
    left: 5%; 
    width: 90%; 
    padding: 12px; 
    border-radius: 8px; 
    font-size: 1.1em; 
    font-weight: bold; 
    text-align: center; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    display: none; 
    z-index: 9999;
    text-transform: uppercase; 
    color: white;
    pointer-events: none; /* FOARTE IMPORTANT: Asta face bara să fie "fantomă" */
}
        .trial-tag { 
            position: fixed; bottom: 10px; width: 100%; 
            text-align: center; color: #ffcc00; 
            font-size: 0.7em; font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>

    <div id="verdict-box" class="verdict"></div>
    <div class="trial-tag">⏳ LICENȚĂ TRIAL: 2 ZILE RĂMASE (39.000 useri activi)</div>

<script>
    // 1. VERIFICARE LICENȚĂ
    function verificaLicenta() {
        let start = localStorage.getItem('start_trial');
        let acum = new Date().getTime();
        if (!start) { localStorage.setItem('start_trial', acum); return true; }
        if (acum - start > 2 * 24 * 60 * 60 * 1000) {
            document.body.innerHTML = "<div style='background:#000;color:#fff;height:100vh;text-align:center;padding-top:50px;'><h1>⏳ TRIAL EXPIRAT</h1><button style='padding:20px;background:#2700ff;color:#fff;border:none;border-radius:10px;'>CUMPĂRĂ LICENȚĂ</button></div>";
            return false;
        }
        return true;
    }

    // 2. LOGICA DE CALCUL
    function buclaMonitorizare() {
        setTimeout(() => {
            let pretCursa = (Math.random() * 30 + 15).toFixed(2); 
            let km = (Math.random() * 8 + 2).toFixed(1); 
            let profitNet = (pretCursa * 0.9) - (km * 0.75);
            let rataPeOra = (profitNet / 25) * 60; 

            let vBox = document.getElementById('verdict-box');
            vBox.style.display = "block";
            
            if (rataPeOra > 45) {
                vBox.style.background = "#28a745"; 
                vBox.innerHTML = "ACCEPTĂ ✅<br><span style='font-size:0.6em;'>Banii tăi: " + profitNet.toFixed(2) + " RON | Rata: " + rataPeOra.toFixed(2) + " RON/h</span>";
            } else {
                vBox.style.background = "#ff4d4d"; 
                vBox.innerHTML = "REFUZĂ ❌<br><span style='font-size:0.6em;'>Câștigi prea puțin: " + rataPeOra.toFixed(2) + " RON/h</span>";
            }

            setTimeout(() => { vBox.style.display = "none"; }, 7000);
            buclaMonitorizare();
        }, 10000); 
    }

    if (verificaLicenta()) { buclaMonitorizare(); }
</script>
</body>
</html>
